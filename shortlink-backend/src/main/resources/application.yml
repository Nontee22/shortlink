server:
  port: 8080

spring:
  application:
    name: shortlink-service

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/shortlink?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:changeme}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:changeme}
    password: ${RABBITMQ_PASSWORD:changeme}
    virtual-host: /
    listener:
      simple:
        prefetch: 1
        acknowledge-mode: manual

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# Redisson Config
redisson:
  single-server-config:
    address: redis://${REDIS_HOST:localhost}:6379
    database: 0
    connection-minimum-idle-size: 5
    connection-pool-size: 10

# Short Link Config
shortlink:
  domain: ${SHORTLINK_DOMAIN:http://localhost:8080}
  cache:
    expire-hours: 24
    random-hours: 6
  bloom-filter:
    expected-insertions: 1000000
    fpp: 0.001

# Knife4j Config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
